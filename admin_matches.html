<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>BT Enter Matches</title>
    <link rel="stylesheet" href="mystyle.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏷️</text></svg>">
</head>

<body>
    <!-- Header bar -->
    <div class="admin">
        <a class="btn" href="./admin_matches.html">Enter Matches</a>
        <a class="btn" href="./admin_users.html">Add User</a>
        <a class="btn" href="./index.html">Leaderboard</a>
        <a class="btn" onclick="signOut()">Logout</a>
    </div>
    <!-- Header bar -->

    <div>
        <p style="color:#fff!important;background-color:#d13b00!important;padding:5px 5px 5px">Matches must be entered
            chronologically for reporting to work</p>
    </div>

    <h2>Submit Match</h2>

    <!-- Adding a Date/Time selector-->
    <label for="matchDate">Approx date & time the match finished: <br> </label><input id="matchDate"
        type="datetime-local"><br>

    <select id="count">
        <option value="2">2 Players</option>
        <option value="3" selected>3 Players</option>
        <option value="4">4 Players</option>
        <option value="5">5 Players</option>
        <option value="6">6 Players</option>
        <option value="7">7 Players</option>
        <option value="8">8 Players</option>
    </select>

    <button onclick="build()">Build</button>

    <div id="box"></div>

    <button onclick="submit()">Submit</button>

    <pre id="log"></pre>

    <script type="module">

        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const URL = "https://limuvydpgucakoxopnlu.supabase.co";
        const KEY = "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";
        const supabase = createClient(URL, KEY);

        //Redirect unauthenticated users back to login:
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            window.location.href = "./admin_login.html";
        } else {
            console.log("Logged in:", user.id);
            console.log("1.0");
        }

        let players = [];

        function log(x) { document.getElementById("log").textContent += x + "\n"; }

        // New Load() from Copilot  
        async function load() {
            const res = await fetch(
                URL + "/rest/v1/v_leaderboard",
                {
                    headers: {
                        apikey: KEY,
                        Authorization: "Bearer " + KEY
                    }
                }
            );

            players = await res.json();
        }

        // New build() from Copilot
        window.build = function build() {
            
            const c = +document.getElementById("count").value;
            const box = document.getElementById("box");

            box.innerHTML = "";
            for (let i = 0; i < c; i++) {
                const row = document.createElement("div");
                row.style.marginBottom = "8px";
                const lbl = document.createElement("span");
                lbl.textContent = `${i + 1} place `;
                const sel = document.createElement("select");
                sel.id = "p" + i;
                const blank = document.createElement("option");
                blank.value = "";
                blank.textContent = "-- Select Player --";
                sel.appendChild(blank);
                players.forEach(p => {
                    const opt = document.createElement("option");
                    opt.value = p.player_id;
                    opt.textContent =
                        `${p.name} (T${p.tag_number})`;
                    sel.appendChild(opt);
                });
                row.appendChild(lbl);
                row.appendChild(sel);
                box.appendChild(row);
            }
        }

        function setDefaultMatchDate() {
            const now = new Date();
            const local =
                new Date(
                    now.getTime() -
                    now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

            document.getElementById("matchDate").value = local;
        }

        // New submit from copilot
        window.submit = async function submit() {
            //const matchId = crypto.randomUUID(); //added this to generate match_id
            //moving to a "dumb" method for match ID due to S3 not supporting https
            const matchId =
                'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'
                    .replace(/[xy]/g, function (c) {
                        const r = Math.random() * 16 | 0;
                        const v = c === 'x' ? r : (r & 0x3 | 0x8);
                        return v.toString(16);
                    });

            //const matchDate = document.getElementById("matchDate").value; //get date time from selector
            const matchDate = new Date(document.getElementById("matchDate").value).toISOString();

            const c = +document.getElementById("count").value;
            const selectedPlayers = [];

            for (let i = 0; i < c; i++) {
                const playerId = document.getElementById("p" + i).value;
                if (!playerId) {
                    alert("All positions must have a player");
                    return;
                }
                if (selectedPlayers.includes(playerId)) {
                    alert("Player selected more than once");
                    return;
                }
                selectedPlayers.push(playerId);
            }
            const selectedData = selectedPlayers.map(id =>
                players.find(p => p.player_id === id)
            );

            const tagsInPlay = selectedData
                .map(p => p.tag_number)
                .sort((a, b) => a - b);
            const results = selectedData.map((player, index) => {
                return {
                    match_id: matchId,
                    player_id: player.player_id,
                    tag_start: player.tag_number,
                    tag_finish: tagsInPlay[index],
                    finish_position: index + 1,
                    num_players: c,
                    played_at: matchDate
                };
            });

            log("Match payload:");
            log(JSON.stringify(results, null, 2));

            /* this way uses API key, not supabase jwt auth
            const res = await fetch(
                URL + "/rest/v1/rpc/submit_match",
                {
                    method: "POST",
                    headers: {
                        apikey: KEY,
                        Authorization: "Bearer " + KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        p_results: results
                    })
                }
            );
            */ 
           //Move to the following:
           const { data, error } = await supabase.rpc('submit_match',{p_results: results});

            if (error) {
                console.error(error);
                alert(error.message);
                return;
        }

        log(JSON.stringify(data, null, 2));

        alert("Match submitted");

        }

        window.signOut = async function signOut() {
            //const { error } = await supabase.auth.signOut() //Global scope: Signs user out of all devices
            const { error } = await supabase.auth.signOut({ scope: 'local' }) //Local scope: Signs out of only this device

            if (!error) {
                window.location.href = "./admin_login.html"; 
            } else {
                console.error(error);    
            }
        }

        setDefaultMatchDate();
        load();

    </script>
</body>

</html>
