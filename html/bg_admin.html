<!DOCTYPE html>
<html>
<head>
  <title>Bag Tag Admin</title>

  <style>
    body { font-family: Arial; margin: 40px; }
    select, input, button { margin: 8px 0; padding: 6px; }
    .row { margin-bottom: 12px; }
    #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 10px; }
  </style>
</head>

<body>

<h1>Admin Match Entry</h1>

<label>Number of Players</label>
<input id="playerCount" type="number" min="2" max="6" value="3" />
<button onclick="buildSelectors()">Generate</button>

<div id="selectors"></div>

<button onclick="submitMatch()">Submit Match</button>

<pre id="log"></pre>

<script>
const SUPABASE_URL = "https://limuvydpgucakoxopnlu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";

let players = [];

function log(msg) {
  document.getElementById("log").textContent += msg + "\n";
}

/**
 * Load players + current tags (EVENT SOURCED SAFE VERSION)
 */
async function loadPlayers() {
  log("Loading players...");

  const [tagRes, playerRes] = await Promise.all([
    fetch(SUPABASE_URL + "/rest/v1/current_tag_holdings?select=player_id,tag_number", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }),
    fetch(SUPABASE_URL + "/rest/v1/players?select=player_id,name", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    })
  ]);

  const tags = await tagRes.json();
  const playerList = await playerRes.json();

  // merge manually (no FK dependency required)
  players = tags.map(t => {
    const p = playerList.find(x => x.player_id === t.player_id);
    return {
      player_id: t.player_id,
      name: p ? p.name : "Unknown",
      tag_number: t.tag_number
    };
  });

  // sort by tag number (leaderboard order)
  players.sort((a, b) => a.tag_number - b.tag_number);

  log("Loaded " + players.length + " players");
}

/**
 * Build dropdown selectors
 */
function buildSelectors() {
  const count = parseInt(document.getElementById("playerCount").value);
  const container = document.getElementById("selectors");

  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const div = document.createElement("div");
    div.className = "row";

    const label = document.createElement("label");
    label.textContent = ordinal(i + 1) + " Place";

    const sel = document.createElement("select");
    sel.id = "p" + i;

    players.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.player_id;
      opt.textContent = `${p.name} (Tag ${p.tag_number})`;
      sel.appendChild(opt);
    });

    div.appendChild(label);
    div.appendChild(document.createElement("br"));
    div.appendChild(sel);

    container.appendChild(div);
  }
}

/**
 * Convert 1st/2nd/3rd etc
 */
function ordinal(n) {
  return ["1st","2nd","3rd","4th","5th","6th"][n-1] || n + "th";
}

/**
 * Submit match via RPC
 */
async function submitMatch() {

  const count = parseInt(document.getElementById("playerCount").value);
  const order = [];

  for (let i = 0; i < count; i++) {
    order.push(document.getElementById("p" + i).value);
  }

  log("Submitting match...");

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/rpc/submit_match",
    {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        p_season_id: 1,
        p_player_ids: order
      })
    }
  );

  const data = await res.json();

  log(JSON.stringify(data, null, 2));

  await loadPlayers();
  buildSelectors();
  setTimeout(() => { location.reload(); }, 3000);
}

// init
loadPlayers();

</script>

</body>
</html>
