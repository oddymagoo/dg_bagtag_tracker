<!DOCTYPE html>
<html>
<head>
  <title>Bag Tag Stats</title>

  <style>
    body { font-family: Arial; margin: 40px; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ddd; padding: 8px; }
    th { background: #111827; color: white; }
  </style>
</head>

<body>

<h1>Stats Engine</h1>

<h2>Leaderboard</h2>
<table>
  <thead>
    <tr><th>Tag</th><th>Player</th></tr>
  </thead>
  <tbody id="lb"></tbody>
</table>

<h2>Top Tag Defences (any)</h2>
<table>
  <thead>
    <tr><th>Player</th><th>Defences</th></tr>
  </thead>
  <tbody id="def"></tbody>
</table>

<h2>Top Ownership</h2>
<table>
  <thead>
    <!--<tr><th>Player</th><th>Defences</th></tr> -->
  </thead>
  <tbody id="own"></tbody>
</table>

<script>
const SUPABASE_URL = "https://limuvydpgucakoxopnlu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";

async function loadLeaderboard() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/leaderboard",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();
  document.getElementById("lb").innerHTML =
    data.map(r =>
      `<tr><td>${r.tag_number}</td><td>${r.name}</td></tr>`
    ).join("");
}

async function loadDefences() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/tag_defences?select=*",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  document.getElementById("def").innerHTML =
    data.map(r =>
      `<tr><td>${r.name}</td><td>${r.defences}</td></tr>`
    ).join("");
}

async function loadOwnership() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/tag_ownership_timeline?select=*",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  document.getElementById("own").innerHTML =
    data.map(r =>
      `<tr><td>${r.name}</td><td>${r.tag_number}</td><td>${r.acquired_at}</td><td>${r.lost_at}</td></tr>`
    ).join("");
}

loadLeaderboard();
loadDefences();
loadOwnership();
</script>

</body>
</html>
