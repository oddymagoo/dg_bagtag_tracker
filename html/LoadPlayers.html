<!doctype html>
<html>
<body>
<h1>Bag Tags</h1>

<button onclick="loadPlayers()">Load Players</button>

<pre id="output"></pre>

<script>
const SUPABASE_URL = "https://limuvydpgucakoxopnlu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";

async function loadPlayers() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/players",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}
</script>
