<!doctype html>
<html>
<body>
<h1>Standings</h1>

<button onclick="current_tag_holdings()">Load Current Tags</button>

<pre id="output"></pre>

<script>
const SUPABASE_URL = "https://limuvydpgucakoxopnlu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";

async function current_tag_holdings() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/current_tag_holdings?select=tag_number,acquired_at,players(name)&order=tag_number.asc",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
