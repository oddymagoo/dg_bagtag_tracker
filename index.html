<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>bT Admin V3 - Stats</title>
  <link rel="stylesheet" href="mystyle.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
<button onclick="loadAll()">Refresh</button>

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Defences</h2>
<h3>Defended #1 tag</h3>
<table id="defences_one"></table>

<h3>Time spent with #1</h3>
<table id="hold_one"></table>

<h3>Defended tag</h3>
<table id="defences_any"></table>

<h3>Total Tag Matches</h3>
<table id="tag_challenges"></table>

<script>

const URL = "https://limuvydpgucakoxopnlu.supabase.co";
const KEY = "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";

function parseDuration(interval) {
  // format: HH:MM:SS.microseconds
  const [h, m, s] = interval.split(":");

  const seconds = parseFloat(s);
  return (
    parseInt(h) * 3600 * 1000 +
    parseInt(m) * 60 * 1000 +
    seconds * 1000
  );
}

async function fetchTable(table) {
  const res = await fetch(`${URL}/rest/v1/${table}?select=*`, {
    headers: {
      apikey: KEY,
      Authorization: "Bearer " + KEY
    }
  });
  return await res.json();
}

function renderTable(el, data, cols) {
  let html = "<tr>" + cols.map(c => `<th>${c}</th>`).join("") + "</tr>";

  data.forEach(row => {
    html += "<tr>" + cols.map(c => {
      let value = row[c] ?? "";

      if (c === "last_updated") {
        value = formatDate(value);
      }

      return `<td>${value}</td>`;
    }).join("") + "</tr>";
  });

  el.innerHTML = html;
}

function msToHours(ms) {
  return (ms / 1000 / 60 / 60).toFixed(2);
}

function formatDate(ts) {
  if (!ts) return "";

  return new Date(ts).toLocaleString("en-AU", {
    year: "numeric",
    month: "short",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function loadAll() {

  const leaderboard = await fetchTable("v_leaderboard");
  renderTable(document.getElementById("leaderboard"),
    leaderboard,
    ["name","tag_number","last_updated"]
  );

  const defences_one = await fetchTable("v_defences_one");
  renderTable(document.getElementById("defences_one"),
    defences_one,
    ["name","defence_count"]
  );

  const hold_one = await fetchTable("v_hold_one_calc");
  renderTable(document.getElementById("hold_one"),
    hold_one,
    ["name","hours_holding_tag1"]
  );

  const defences_any = await fetchTable("v_defences_any");
  renderTable(document.getElementById("defences_any"),
    defences_any,
    ["name","defence_count"]
  );
  
  const tag_challenges = await fetchTable("v_tag_challenges");
  renderTable(document.getElementById("tag_challenges"),
    tag_challenges,
    ["name","total_challenges"]
  );
}

loadAll();

</script>

</body>
</html>
