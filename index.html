function showTab(tab) {

  document.getElementById("leaderboardTab").style.display = "none";
  document.getElementById("historyTab").style.display = "none";

  document.getElementById(tab).style.display = "block";

}



// =========================
// HELPERS
// =========================


function parseDuration(interval) {

  const [h, m, s] = interval.split(":");

  const seconds = parseFloat(s);

  return (
    parseInt(h) * 3600 * 1000 +
    parseInt(m) * 60 * 1000 +
    seconds * 1000
  );
}



async function fetchTable(table) {

  const res = await fetch(
    `${URL}/rest/v1/${table}?select=*`,
    {
      headers:{
        apikey: KEY,
        Authorization:"Bearer " + KEY
      }
    }
  );

  return await res.json();

}

function renderTable(el, data, cols) {
  let html = "<tr>" + cols.map(c => `<th>${c}</th>`).join("") + "</tr>";

  let lastMatchId = null;
  let blue = true;
  data.forEach(row => {
    // Toggle colour whenever we hit a new match
    if (row.match_id !== lastMatchId) {
      blue = !blue;
      lastMatchId = row.match_id;
    }
    const rowStyle = blue
      ? ' style="background-color:#dbeeff;"'
      : '';
    html += `<tr${rowStyle}>`;
    html += cols.map(c => {
      let value = row[c] ?? "";

      if (c === "played_at" || c === "last_updated" || c === "match_concluded") {
        value = formatDate(value);
      }
      return `<td>${value}</td>`;
    }).join("");
    html += "</tr>";
  });
  el.innerHTML = html;
}


function formatDate(ts) {
  if(!ts) return "";
  return new Date(ts).toLocaleString("en-AU", {
    year:"numeric",
    month:"short",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit"
  });
}
