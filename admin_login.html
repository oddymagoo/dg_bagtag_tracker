<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>BT Login</title>
    <link rel="stylesheet" href="mystyle.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏷️</text></svg>">
</head>


<body>
    <div class="tabs">
        <button onclick="window.location.href = 'index.html';">
            Leaderboard
        </button>

        <button onclick="window.location.href = 'admin_login.html';">
            Admin
        </button>
    </div>

    <h2>Admin Login</h2>
    <form id="loginForm">
        <label>
            Email
            <input type="email" id="email" required>
        </label>
        <br><br>
        <label>
            Password
            <input type="password" id="password" required>
        </label>
        <br><br>
        <button type="submit">
            Login
        </button>
    </form>

    <pre id="output"></pre>

    <script type="module">
        import { createClient }
            from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const URL =
            "https://limuvydpgucakoxopnlu.supabase.co";

        const KEY =
            "sb_publishable_QtvwZYGXT_U7cNkX19yUBw_KJnTs7HP";

        const supabase = createClient(URL, KEY);

        const form = document.getElementById("loginForm");
        const output = document.getElementById("output");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            /*
            const { error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
            */

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                output.textContent = "Login failed: " + error.message;
                return;
            }
            //console.log("User:", data.user);
            //console.log("Email:", data.user.email);
            window.location = "./admin_matches.html";
        });

    </script>
</body>
</html>
